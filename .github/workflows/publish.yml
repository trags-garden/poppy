name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  # Manual trigger (Actions tab / `gh workflow run publish.yml`). Builds the
  # version currently in pyproject.toml; PyPI rejects re-uploading an existing
  # version, so use this to re-run a failed upload or publish a fresh bump.
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # OIDC token for PyPI Trusted Publishing (no stored API token)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify build metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
